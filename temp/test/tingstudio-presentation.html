<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TingStudio - 食品配方智能管理平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-card: #111827;
  --bg-card-alt: #1a1f36;
  --blue-primary: #4A90D9;
  --blue-light: #6BA8E8;
  --blue-lighter: #A3C8F0;
  --blue-dark: #3570B0;
  --blue-deep: #2A5C96;
  --blue-glow: rgba(74, 144, 217, 0.3);
  --accent-cyan: #22D3EE;
  --accent-teal: #14B8A6;
  --text-primary: #E8E8F0;
  --text-secondary: #94A3B8;
  --text-muted: #64748B;
  --border: #1E293B;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --font-display: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  --font-body: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

/* Background particles */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(74,144,217,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,144,217,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
.bg-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}
.bg-glow.top-right { background: var(--blue-primary); top: -200px; right: -200px; }
.bg-glow.bottom-left { background: var(--accent-cyan); bottom: -200px; left: -200px; }

/* Slide container */
.slides-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide {
  position: absolute;
  width: min(92vw, 1200px);
  height: min(90vh, 675px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 48px 56px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateX(60px) scale(0.96);
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(74,144,217,0.1) inset;
}
.slide.active {
  opacity: 1;
  transform: translateX(0) scale(1);
  pointer-events: auto;
}
.slide.exit-left {
  opacity: 0;
  transform: translateX(-60px) scale(0.96);
}

/* Cover slide special */
.slide-cover {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(ellipse at center, rgba(74,144,217,0.12) 0%, transparent 70%), var(--bg-card);
}
.slide-cover .logo-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--blue-primary), var(--accent-cyan));
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 28px;
  box-shadow: 0 8px 32px var(--blue-glow);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.slide-cover h1 {
  font-size: 48px;
  font-weight: 700;
  font-family: var(--font-display);
  letter-spacing: 2px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #fff, var(--blue-lighter));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.slide-cover .subtitle {
  font-size: 20px;
  color: var(--text-secondary);
  margin-bottom: 36px;
  letter-spacing: 4px;
}
.slide-cover .meta {
  display: flex;
  gap: 40px;
  color: var(--text-muted);
  font-size: 14px;
}
.slide-cover .meta span {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Section title */
.section-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--blue-light);
  margin-bottom: 8px;
  font-weight: 600;
}
.slide-title {
  font-size: 32px;
  font-weight: 700;
  font-family: var(--font-display);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.slide-title .accent {
  color: var(--blue-primary);
}
.slide-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

/* Divider */
.divider {
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--blue-primary), var(--accent-cyan));
  border-radius: 2px;
  margin-bottom: 32px;
}

/* Content grid */
.content-grid { display: grid; gap: 20px; flex: 1; }
.content-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.content-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.content-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

/* Card */
.card {
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  transition: all 0.3s ease;
}
.card:hover {
  border-color: var(--blue-dark);
  box-shadow: 0 4px 20px rgba(74,144,217,0.1);
}
.card-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  margin-bottom: 14px;
}
.card-icon.blue { background: rgba(74,144,217,0.15); color: var(--blue-light); }
.card-icon.cyan { background: rgba(34,211,238,0.15); color: var(--accent-cyan); }
.card-icon.teal { background: rgba(20,184,166,0.15); color: var(--accent-teal); }
.card-icon.green { background: rgba(16,185,129,0.15); color: var(--success); }
.card h3 { font-size: 16px; margin-bottom: 8px; font-weight: 600; }
.card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* Feature card with screenshot */
.feature-card {
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: all 0.3s ease;
}
.feature-card:hover {
  border-color: var(--blue-dark);
  box-shadow: 0 8px 30px rgba(74,144,217,0.12);
}
.feature-card .fc-header {
  padding: 20px 20px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.feature-card .fc-header .fc-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.feature-card .fc-header h4 { font-size: 15px; font-weight: 600; }
.feature-card .fc-header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.feature-card .fc-screenshot {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-top: 1px solid var(--border);
  display: block;
}

/* Comparison table */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.compare-table th {
  text-align: left;
  padding: 14px 16px;
  background: var(--bg-card-alt);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 13px;
}
.compare-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
.compare-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
.compare-table td {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(30,41,59,0.5);
  vertical-align: middle;
}
.compare-table tr:last-child td { border-bottom: none; }
.compare-table .bad-excel {
  color: var(--danger);
  display: flex;
  align-items: center;
  gap: 6px;
}
.compare-table .good-ts {
  color: var(--success);
  display: flex;
  align-items: center;
  gap: 6px;
}
.compare-table .highlight-col {
  background: rgba(74,144,217,0.06);
  border-left: 2px solid var(--blue-primary);
}

/* Stats row */
.stat-row {
  display: flex;
  gap: 20px;
  margin-bottom: 24px;
}
.stat-card {
  flex: 1;
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 36px;
  font-weight: 700;
  font-family: var(--font-display);
  background: linear-gradient(135deg, var(--blue-light), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-card .stat-label {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Chart container */
.chart-wrap {
  width: 100%;
  height: 220px;
  position: relative;
}
.chart-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

/* Timeline */
.timeline {
  display: flex;
  gap: 16px;
  justify-content: center;
}
.timeline-item {
  flex: 1;
  text-align: center;
  position: relative;
}
.timeline-item::after {
  content: '';
  position: absolute;
  top: 16px;
  left: calc(50% + 24px);
  width: calc(100% - 48px);
  height: 2px;
  background: var(--border);
}
.timeline-item:last-child::after { display: none; }
.timeline-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
}
.timeline-dot.blue { background: rgba(74,144,217,0.2); color: var(--blue-light); }
.timeline-item h4 { font-size: 14px; margin-bottom: 4px; }
.timeline-item p { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

/* Flow steps */
.flow-steps {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.flow-step {
  flex: 1;
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 16px;
  text-align: center;
  position: relative;
}
.flow-step .step-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--blue-primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  margin: 0 auto 10px;
}
.flow-step h4 { font-size: 14px; margin-bottom: 4px; }
.flow-step p { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

/* Navigation */
.nav-bar {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 12px;
  align-items: center;
  background: rgba(17,24,39,0.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 8px 16px;
}
.nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.nav-btn:hover { background: var(--bg-card-alt); color: #fff; border-color: var(--blue-dark); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn:disabled:hover { background: transparent; color: var(--text-secondary); border-color: var(--border); }
.page-indicator {
  font-size: 13px;
  color: var(--text-secondary);
  min-width: 70px;
  text-align: center;
}
.page-indicator strong { color: #fff; }

/* Progress bar */
.nav-progress {
  width: 120px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.nav-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue-primary), var(--accent-cyan));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Keyframe animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInRight {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes countUp {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
.anim-fade-up { animation: fadeInUp 0.6s ease forwards; }
.anim-fade-right { animation: fadeInRight 0.6s ease forwards; }
.anim-delay-1 { animation-delay: 0.1s; opacity: 0; }
.anim-delay-2 { animation-delay: 0.2s; opacity: 0; }
.anim-delay-3 { animation-delay: 0.3s; opacity: 0; }
.anim-delay-4 { animation-delay: 0.4s; opacity: 0; }
.anim-delay-5 { animation-delay: 0.5s; opacity: 0; }

/* Badge */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue { background: rgba(74,144,217,0.15); color: var(--blue-light); }
.badge-green { background: rgba(16,185,129,0.15); color: var(--success); }
.badge-cyan { background: rgba(34,211,238,0.15); color: var(--accent-cyan); }

/* CTA button */
.cta-btn {
  display: inline-block;
  padding: 14px 36px;
  background: linear-gradient(135deg, var(--blue-primary), var(--blue-dark));
  color: #fff;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(74,144,217,0.3);
  cursor: pointer;
  border: none;
  letter-spacing: 1px;
}
.cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(74,144,217,0.4);
}

/* Value list */
.value-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.value-list li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  font-size: 14px;
  line-height: 1.5;
}
.value-list .check-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(16,185,129,0.15);
  color: var(--success);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
  margin-top: 2px;
}

/* Keyboard hint */
.kb-hint {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--text-muted);
  z-index: 9;
  opacity: 0.6;
}

/* Fullscreen mode */
.fullscreen-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 10;
  background: rgba(17,24,39,0.8);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
.fullscreen-btn:hover { color: #fff; border-color: var(--blue-dark); }

/* Last slide - CTA */
.slide-cta {
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(ellipse at center, rgba(74,144,217,0.1) 0%, transparent 70%), var(--bg-card);
}
.slide-cta h2 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 16px;
  font-family: var(--font-display);
}
.slide-cta .cta-desc {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 36px;
  max-width: 500px;
  line-height: 1.6;
}
.slide-cta .contact-row {
  display: flex;
  gap: 40px;
  margin-top: 32px;
  color: var(--text-muted);
  font-size: 14px;
}

/* Tag list */
.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.tag-list .tag {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  background: rgba(74,144,217,0.1);
  color: var(--blue-lighter);
  border: 1px solid rgba(74,144,217,0.2);
}

/* Responsive */
@media (max-width: 900px) {
  .slide { padding: 32px 24px; width: 96vw; height: auto; min-height: 85vh; }
  .content-grid.cols-2, .content-grid.cols-3, .content-grid.cols-4 { grid-template-columns: 1fr; }
  .slide-cover h1 { font-size: 32px; }
  .slide-title { font-size: 24px; }
  .stat-row { flex-wrap: wrap; }
  .stat-card { min-width: 140px; }
  .flow-steps { flex-wrap: wrap; }
  .compare-table { font-size: 12px; }
  .compare-table th, .compare-table td { padding: 10px 8px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow top-right"></div>
<div class="bg-glow bottom-left"></div>

<button class="fullscreen-btn" onclick="toggleFullscreen()" title="全屏">&#9974;</button>

<div class="slides-wrap" id="slidesWrap"></div>

<div class="kb-hint">使用 ← → 方向键 或 点击底部按钮切换页面</div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="prevSlide()">&#10094;</button>
  <div class="nav-progress"><div class="nav-progress-fill" id="progressFill"></div></div>
  <span class="page-indicator"><strong id="currentPage">1</strong> / <span id="totalPages">18</span></span>
  <button class="nav-btn" id="nextBtn" onclick="nextSlide()">&#10095;</button>
</div>

<script>
// ============ SLIDE DATA ============
const slides = [
  // 1 - 封面
  {
    cls: 'slide-cover',
    html: `
      <div class="logo-icon">&#9879;</div>
      <h1>TingStudio</h1>
      <div class="subtitle">食品配方智能管理平台</div>

        专为中草药功效配方研发打造的一站式数字化管理解决方案<br>
        覆盖配方全生命周期，赋能配方研发效率提升
      </p>
      <div class="meta">
        <span>&#128197; 2026年6月</span>
        <span>&#127760; 项目推介</span>
      </div>
    `
  },
  // 2 - 目录
  {
    html: `
      <div class="section-label">CONTENTS</div>
      <div class="slide-title">内容<span class="accent">导航</span></div>
      <div class="divider"></div>
      <div class="content-grid cols-3" style="align-content: start;">
        <div class="card anim-fade-up anim-delay-1">
          <div class="card-icon blue">01</div>
          <h3>项目概述</h3>
          <p>行业痛点分析、产品定位与核心价值</p>
        </div>
        <div class="card anim-fade-up anim-delay-2">
          <div class="card-icon cyan">02</div>

          <p>配方管理、原料管理、营养分析、AI助手等</p>
        </div>
        <div class="card anim-fade-up anim-delay-3">
          <div class="card-icon teal">03</div>
          <h3>Excel vs TingStudio</h3>
          <p>多维度对比分析，量化数字化优势</p>
        </div>
        <div class="card anim-fade-up anim-delay-4">
          <div class="card-icon green">04</div>
          <h3>增效价值量化</h3>
          <p>效率数据、ROI分析与真实案例</p>
        </div>
        <div class="card anim-fade-up anim-delay-5" style="grid-column:1/-1;text-align:center;">
          <div class="card-icon blue" style="margin:0 auto 14px;">&#9889;</div>
          <h3>价值总结与行动指引</h3>
          <p>核心价值回顾与下一步合作计划</p>
        </div>
      </div>
    `
  },
  // 3 - 行业痛点
  {
    html: `
      <div class="section-label">PROBLEM</div>
      <div class="slide-title">行业<span class="accent">痛点</span>分析</div>
      <div class="divider"></div>
      <div class="content-grid cols-2">
        <div class="card anim-fade-up anim-delay-1">

// ============ RENDER SLIDES ============
const wrap = document.getElementById('slidesWrap');
slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (s.cls ? ' ' + s.cls : '');
  div.innerHTML = s.html;
  div.id = 'slide-' + i;
  wrap.appendChild(div);
});

// ============ NAVIGATION ============
let current = 0;
const total = slides.length;
document.getElementById('totalPages').textContent = total;

function showSlide(index) {
  const allSlides = document.querySelectorAll('.slide');
  allSlides.forEach((s, i) => {
    s.classList.remove('active', 'exit-left');
    if (i === index) {
      s.classList.add('active');
    } else if (i < index) {
      s.classList.add('exit-left');
    }
  });
  document.getElementById('currentPage').textContent = index + 1;
  document.getElementById('progressFill').style.width = ((index + 1) / total * 100) + '%';
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === total - 1;
  current = index;

  // Re-trigger animations for active slide
  const activeSlide = allSlides[index];
  activeSlide.querySelectorAll('.anim-fade-up, .anim-fade-right').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
}

function nextSlide() {
  if (current < total - 1) showSlide(current + 1);
}
function prevSlide() {
  if (current > 0) showSlide(current - 1);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault();
    nextSlide();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    prevSlide();
  } else if (e.key === 'Home') {
    e.preventDefault();
    showSlide(0);
  } else if (e.key === 'End') {
    e.preventDefault();
    showSlide(total - 1);
  }
});

// Touch support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) nextSlide();
    else prevSlide();
  }
});

// Fullscreen
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// Initialize
showSlide(0);

chartObserver.observe(wrap, { attributes: true, subtree: true, attributeFilter: ['class'] });
