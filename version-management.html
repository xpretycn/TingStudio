<!doctype html>

<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>版本管理 | PureFormulate</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      .sidebar-item:hover {
        background-color: #f0fdf4;
        color: #16a34a;
        transform: translateX(5px);
      }
      .status-badge {
        @apply px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider;
      }
      .glass-modal {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1fae5;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="bg-[#f8fafc] text-slate-700 font-sans leading-relaxed">
    <!-- 侧边导航 -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-100 z-50 transition-all duration-300">
      <div class="p-6">
        <div class="flex items-center gap-2 mb-8">
          <div
            class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-200">
            <iconify-icon class="text-white text-2xl" icon="lucide:beaker"></iconify-icon>
          </div>
          <h1 class="text-xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent">
            PureFormulate
          </h1>
        </div>
        <nav class="space-y-2">
          <a
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 transition-all"
            href="https://modao.cc/agent-py/workspace/69cf7edcb97578b53dfe41dc/配方师配方管理系统_v11.html/index.html?render_html=true">
            <iconify-icon class="text-xl" icon="lucide:layout-dashboard"></iconify-icon>配方首页
          </a>
          <a
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 transition-all"
            href="https://modao.cc/agent-py/workspace/69cf7edcb97578b53dfe41dc/配方师配方管理系统_v11.html/new-recipe.html?render_html=true">
            <iconify-icon class="text-xl" icon="lucide:plus-circle"></iconify-icon>新建配方
          </a>
          <a
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 transition-all"
            href="https://modao.cc/agent-py/workspace/69cf7edcb97578b53dfe41dc/配方师配方管理系统_v11.html/recipe-detail.html?render_html=true">
            <iconify-icon class="text-xl" icon="lucide:file-text"></iconify-icon>配方详情
          </a>
          <a
            class="flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-50 text-emerald-600 font-medium transition-all"
            href="https://modao.cc/agent-py/workspace/69cf7edcb97578b53dfe41dc/配方师配方管理系统_v11.html/version-management.html?render_html=true">
            <iconify-icon class="text-xl" icon="lucide:history"></iconify-icon>版本管理
          </a>
        </nav>
      </div>
      <div class="absolute bottom-6 left-6 right-6">
        <div class="bg-emerald-800 rounded-2xl p-4 text-white relative overflow-hidden mb-3">
          <div class="relative z-10 flex justify-between items-center">
            <div>
              <p class="text-2xl font-bold leading-none">13</p>
              <p class="text-xs opacity-70 mt-1">2026年4月 · 星期一</p>
            </div>
            <div class="text-right">
              <div class="flex items-center justify-end gap-1 mb-1">
                <iconify-icon class="text-lg" icon="lucide:cloud-sun"></iconify-icon>
                <span class="text-sm">晴</span>
              </div>
              <p class="text-xs opacity-70">24°C · 广州市</p>
            </div>
          </div>
        </div>
      </div>
    </aside>
    <!-- 主体内容 -->
    <main class="ml-64 p-8 min-h-screen">
      <header class="flex justify-between items-center mb-8 animate-fade-in">
        <div>
          <nav class="flex items-center gap-2 text-sm text-slate-500 mb-1">
            <a
              class="hover:text-emerald-600"
              href="https://modao.cc/agent-py/workspace/69cf7edcb97578b53dfe41dc/配方师配方管理系统_v11.html/index.html?render_html=true"
              >配方管理</a
            >
            <iconify-icon class="text-xs" icon="lucide:chevron-right"></iconify-icon>
            <span class="text-slate-900 font-medium">版本管理</span>
          </nav>
          <h2 class="text-2xl font-bold text-slate-800">版本控制中心</h2>
        </div>
        <div class="flex gap-3">
          <a
            class="hidden px-6 py-2.5 bg-emerald-500 text-white rounded-xl text-sm font-bold shadow-lg shadow-emerald-100 hover:bg-emerald-600 transition-all flex items-center gap-2"
            href="https://modao.cc/agent-py/workspace/69cf7edcb97578b53dfe41dc/配方师配方管理系统_v11.html/version-compare.html?render_html=true"
            id="compareBtn">
            <iconify-icon class="text-lg" icon="lucide:columns"></iconify-icon>
            进入对比 (<span id="compareCount">0</span>)
          </a>
        </div>
      </header>
      <!-- 版本列表 -->
      <div
        class="bg-white rounded-[2rem] shadow-sm border border-slate-50 overflow-hidden animate-fade-in"
        style="animation-delay: 0.1s">
        <table class="w-full text-left">
          <thead class="bg-slate-50/50 border-b border-slate-50">
            <tr>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">选择对比</th>
              <th class="px-4 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">版本号</th>
              <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">版本名称</th>
              <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">状态</th>
              <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">创建日期</th>
              <th class="px-6 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">创建人</th>
              <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">操作</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50" id="versionTableBody">
            <!-- 数据行由 JS 渲染 -->
          </tbody>
        </table>
      </div>
    </main>
    <!-- 快照弹窗 -->
    <div class="fixed inset-0 z-[100] hidden items-center justify-center p-4" id="snapshotModal">
      <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeSnapshot()"></div>
      <div class="relative w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-fade-in">
        <div class="p-8 border-b border-slate-50 flex justify-between items-center">
          <div>
            <h3 class="text-xl font-bold text-slate-800" id="snapTitle">版本快照详情</h3>
            <p class="text-sm text-slate-400 mt-1" id="snapSubtitle">配方数据备份记录</p>
          </div>
          <button
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 transition-colors"
            onclick="closeSnapshot()">
            <iconify-icon class="text-xl" icon="lucide:x"></iconify-icon>
          </button>
        </div>
        <div class="p-8 max-h-[70vh] overflow-y-auto">
          <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="p-4 bg-slate-50 rounded-2xl">
              <label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">配方编码</label>
              <p class="font-mono text-sm font-bold text-slate-700" id="snapCode">-</p>
            </div>
            <div class="p-4 bg-slate-50 rounded-2xl">
              <label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">发布状态</label>
              <p class="text-sm font-bold text-slate-700" id="snapStatus">-</p>
            </div>
          </div>
          <div>
            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">原料组成快照</h4>
            <div class="space-y-3" id="snapIngredients">
              <!-- 原料列表 -->
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const versions = [
        {
          id: 1,
          v: "V3.2.0",
          name: "草莓酸奶能量棒-标准版",
          status: "published",
          date: "2026-04-10",
          author: "张研发",
          code: "FD-20260403-01",
          ingredients: [
            { n: "燕麦", p: 45 },
            { n: "酸奶粉", p: 20 },
            { n: "草莓干", p: 15 },
            { n: "蜂蜜", p: 10 },
            { n: "乳清蛋白", p: 10 },
          ],
        },
        {
          id: 2,
          v: "V3.1.5",
          name: "低糖测试版本",
          status: "archived",
          date: "2026-03-25",
          author: "张研发",
          code: "FD-20260325-02",
          ingredients: [
            { n: "燕麦", p: 50 },
            { n: "酸奶粉", p: 15 },
            { n: "草莓干", p: 15 },
            { n: "木糖醇", p: 10 },
            { n: "乳清蛋白", p: 10 },
          ],
        },
        {
          id: 3,
          v: "V3.3.0-Draft",
          name: "高蛋白强化版(内测)",
          status: "draft",
          date: "2026-04-13",
          author: "李工程师",
          code: "FD-20260413-01",
          ingredients: [
            { n: "燕麦", p: 40 },
            { n: "酸奶粉", p: 15 },
            { n: "草莓干", p: 10 },
            { n: "蜂蜜", p: 10 },
            { n: "乳清蛋白", p: 25 },
          ],
        },
        {
          id: 4,
          v: "V3.0.0",
          name: "首发基准版本",
          status: "archived",
          date: "2026-01-15",
          author: "王主管",
          code: "FD-20260115-01",
          ingredients: [
            { n: "燕麦", p: 60 },
            { n: "白砂糖", p: 20 },
            { n: "全脂奶粉", p: 20 },
          ],
        },
      ];

      let selectedForCompare = [];

      function renderTable() {
        const body = document.getElementById("versionTableBody");
        body.innerHTML = versions
          .map(v => {
            const statusStyles = {
              draft: "bg-amber-100 text-amber-600",
              published: "bg-emerald-100 text-emerald-600",
              archived: "bg-slate-200 text-slate-500",
            };
            const statusLabels = { draft: "草稿", published: "已发布", archived: "已归档" };

            const isSelected = selectedForCompare.includes(v.id);

            return `
                    <tr class="hover:bg-slate-50/50 transition-colors group">
                        <td class="px-8 py-5">
                            <input type="checkbox" onchange="toggleCompare(${v.id})" ${isSelected ? "checked" : ""} class="w-5 h-5 rounded-lg border-slate-200 text-emerald-500 focus:ring-emerald-500 transition-all cursor-pointer">
                        </td>
                        <td class="px-4 py-5 font-mono text-xs font-bold text-emerald-600">${v.v}</td>
                        <td class="px-6 py-5 font-medium text-slate-700">${v.name}</td>
                        <td class="px-6 py-5">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold ${statusStyles[v.status]}">${statusLabels[v.status]}</span>
                        </td>
                        <td class="px-6 py-5 text-sm text-slate-400">${v.date}</td>
                        <td class="px-6 py-5 text-sm text-slate-600">${v.author}</td>
                        <td class="px-8 py-5 text-right space-x-2">
                            <button onclick="viewSnapshot(${v.id})" class="p-2 text-slate-400 hover:text-emerald-500 hover:bg-emerald-50 rounded-lg transition-all" title="查看快照">
                                <iconify-icon icon="lucide:eye"></iconify-icon>
                            </button>
                            ${
                              v.status === "draft"
                                ? `
                                <button onclick="publishVersion(${v.id})" class="p-2 text-slate-400 hover:text-blue-500 hover:bg-blue-50 rounded-lg transition-all" title="发布版本">
                                    <iconify-icon icon="lucide:send"></iconify-icon>
                                </button>
                            `
                                : ""
                            }
                            ${
                              v.status === "published"
                                ? `
                                <button onclick="archiveVersion(${v.id})" class="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-all" title="归档">
                                    <iconify-icon icon="lucide:archive"></iconify-icon>
                                </button>
                            `
                                : ""
                            }
                        </td>
                    </tr>
                `;
          })
          .join("");
      }

      function viewSnapshot(id) {
        const v = versions.find(item => item.id === id);
        document.getElementById("snapTitle").innerText = `${v.name} (${v.v})`;
        document.getElementById("snapCode").innerText = v.code;
        document.getElementById("snapStatus").innerText =
          v.status === "published" ? "正式版本" : v.status === "draft" ? "草稿" : "已过期/归档";

        const ingHtml = v.ingredients
          .map(
            ing => `
                <div class="flex justify-between items-center p-3 bg-slate-50/50 rounded-xl border border-slate-100">
                    <span class="text-sm font-medium text-slate-700">${ing.n}</span>
                    <span class="font-mono text-sm font-bold text-emerald-600">${ing.p.toFixed(2)}%</span>
                </div>
            `,
          )
          .join("");
        document.getElementById("snapIngredients").innerHTML = ingHtml;

        const modal = document.getElementById("snapshotModal");
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function closeSnapshot() {
        const modal = document.getElementById("snapshotModal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }

      function toggleCompare(id) {
        const idx = selectedForCompare.indexOf(id);
        if (idx > -1) {
          selectedForCompare.splice(idx, 1);
        } else {
          if (selectedForCompare.length >= 3) {
            alert("最多支持 3 个版本同时对比");
            renderTable();
            return;
          }
          selectedForCompare.push(id);
        }
        updateCompareBtn();
        // 存入 localStorage 供对比页面读取
        localStorage.setItem("compare_versions", JSON.stringify(selectedForCompare));
      }

      function updateCompareBtn() {
        const btn = document.getElementById("compareBtn");
        const count = document.getElementById("compareCount");
        if (selectedForCompare.length > 0) {
          btn.classList.remove("hidden");
          count.innerText = selectedForCompare.length;
        } else {
          btn.classList.add("hidden");
        }
      }

      function publishVersion(id) {
        const v = versions.find(item => item.id === id);
        if (confirm(`确定发布版本 ${v.v} 吗？发布后将作为正式版本。`)) {
          v.status = "published";
          renderTable();
        }
      }

      function archiveVersion(id) {
        const v = versions.find(item => item.id === id);
        if (confirm(`确定将 ${v.v} 归档吗？归档后将变为只读状态。`)) {
          v.status = "archived";
          renderTable();
        }
      }

      // 初始化渲染
      renderTable();
      // 检查是否有之前选择的
      const saved = localStorage.getItem("compare_versions");
      if (saved) {
        selectedForCompare = JSON.parse(saved);
        updateCompareBtn();
        renderTable();
      }
    </script>
  </body>
</html>
